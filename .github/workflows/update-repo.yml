name: Update Kodi Repository Index

on:
  push:
    branches: [main]
    paths:
      - '*/**.zip'
      - '*/addon.xml'
  workflow_dispatch:

jobs:
  regenerate-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate addons.xml and addons.xml.md5
        run: python3 tools/generate_repo.py

      - name: Commit updated index (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add addons.xml addons.xml.md5 index.html
          if git diff --cached --quiet; then
            echo "Index unchanged — nothing to commit"
          else
            git commit -m "chore: regenerate repo index"
            git push
          fi
